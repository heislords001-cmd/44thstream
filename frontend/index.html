<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>44thStream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- HLS.js for streaming video -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="logo display">44th<em>Stream</em></div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search movies, anime, dramas..." autocomplete="off" />
    </div>
    <div class="header-actions">
      <span class="status-badge" id="statusBadge">● Live</span>
      <button class="auth-btn" id="authBtn">Sign In</button>
    </div>
  </header>

  <!-- ===== TABS ===== -->
  <nav class="tabs">
    <button class="tab-btn active" data-tab="movies">🎥 Movies</button>
    <button class="tab-btn" data-tab="anime">🎌 Anime</button>
    <button class="tab-btn" data-tab="dramas">🇰🇷 Korean Dramas</button>
  </nav>

  <!-- ===== HERO ===== -->
  <section class="hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-fade"></div>
    <div class="hero-content">
      <div class="eyebrow" id="heroEyebrow">Now Showing</div>
      <h1 class="hero-title display" id="heroTitle">44thStream</h1>
      <p class="hero-desc" id="heroDesc">Your gateway to movies, anime, and Korean dramas.</p>
      <div class="hero-meta" id="heroMeta"></div>
      <button class="btn-primary" id="heroCta">View Details</button>
    </div>
  </section>

  <!-- ===== MAIN CONTENT ===== -->
  <main>
    <!-- Trending -->
    <div class="section-head">
      <h2 class="section-title display"><span class="num">01</span><span id="sectionTitle">Trending This Week</span></h2>
      <div class="chips" id="genreChips"></div>
    </div>
    <div class="grid" id="mainGrid"></div>

    <!-- Search Results (hidden by default) -->
    <div class="section-head" id="searchHead" style="display:none;">
      <h2 class="section-title display"><span class="num">→</span>Search Results</h2>
    </div>
    <div class="grid" id="searchGrid"></div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <div class="display">44thStream</div>
    <div>Movie data &amp; images courtesy of TMDB · Built with ❤️</div>
  </footer>

  <!-- ===== DETAIL PAGE (hidden by default) ===== -->
  <div id="detailPage" style="display:none;">
    <div class="detail-container">
      <button class="back-btn" id="backBtn">← Back</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- ===== MODAL (for trailer only) ===== -->
  <div class="modal-bg" id="modalBg">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div id="modalContent" class="modal-loading">Loading…</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
