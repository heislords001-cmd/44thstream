<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>44thStream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#130712;
    --void-2:#1c0a19;
    --card:#20101d;
    --cream:#f3e9de;
    --cream-dim:#c9b8ad;
    --gold:#f4b942;
    --crimson:#e63950;
    --teal:#1fe6c4;
    --grad: linear-gradient(115deg, var(--crimson) 0%, var(--gold) 55%, var(--teal) 100%);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--void);
    color:var(--cream);
    font-family:'Work Sans', sans-serif;
    overflow-x:hidden;
  }
  .display{font-family:'Anton', sans-serif; letter-spacing:0.02em; text-transform:uppercase;}

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:22px 5vw;
    position:sticky;
    top:0;
    z-index:50;
    background:rgba(19,7,18,0.85);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(244,185,66,0.12);
    gap:20px;
    flex-wrap:wrap;
  }
  .logo{font-size:26px; letter-spacing:0.03em;}
  .logo em{font-style:normal; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;}

  .search-wrap{
    flex:1;
    min-width:200px;
    max-width:420px;
    position:relative;
  }
  .search-wrap input{
    width:100%;
    background:var(--void-2);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:999px;
    padding:11px 18px;
    color:var(--cream);
    font-size:14px;
    outline:none;
    font-family:'Work Sans',sans-serif;
  }
  .search-wrap input:focus{border-color:var(--gold);}
  .search-wrap input::placeholder{color:var(--cream-dim);}

  .status-badge{
    font-size:11px;
    color:var(--teal);
    background:rgba(31,230,196,0.12);
    padding:4px 14px;
    border-radius:999px;
    border:1px solid rgba(31,230,196,0.25);
  }

  .hero{
    position:relative;
    height:78vh;
    min-height:480px;
    display:flex;
    align-items:flex-end;
    background:radial-gradient(ellipse at top right, rgba(230,57,80,0.18), transparent 55%),
               radial-gradient(ellipse at bottom left, rgba(31,230,196,0.10), transparent 55%),
               var(--void);
    overflow:hidden;
  }
  .hero-bg{
    position:absolute; inset:0;
    background-size:cover;
    background-position:center 20%;
    opacity:0;
    transition:opacity 0.8s ease;
    filter:saturate(1.1);
  }
  .hero-bg.show{opacity:0.55;}
  .hero-fade{
    position:absolute; inset:0;
    background:linear-gradient(to top, var(--void) 8%, rgba(19,7,18,0.35) 45%, rgba(19,7,18,0.15) 100%);
  }
  .hero-content{
    position:relative;
    z-index:2;
    padding:0 5vw 56px;
    max-width:760px;
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    letter-spacing:0.22em;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .eyebrow::before{content:"●"; color:var(--crimson); font-size:9px;}
  .hero-title{
    font-size:clamp(38px, 6vw, 74px);
    line-height:0.95;
    margin:0 0 16px;
  }
  .hero-desc{
    color:var(--cream-dim);
    font-size:15px;
    line-height:1.6;
    max-width:560px;
    margin:0 0 22px;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .hero-meta{display:flex; gap:14px; align-items:center; margin-bottom:24px; flex-wrap:wrap;}
  .pill{
    border:1px solid rgba(244,185,66,0.35);
    color:var(--gold);
    font-size:12px;
    padding:5px 12px;
    border-radius:999px;
    letter-spacing:0.05em;
  }
  .btn-primary{
    background:var(--grad);
    border:none;
    color:var(--void);
    font-weight:700;
    padding:14px 30px;
    border-radius:6px;
    font-size:14px;
    letter-spacing:0.03em;
    text-transform:uppercase;
    cursor:pointer;
    box-shadow:0 12px 30px -8px rgba(230,57,80,0.45);
    transition:transform 0.15s ease;
  }
  .btn-primary:hover{transform:translateY(-2px);}

  main{padding:56px 5vw 100px;}
  .section-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:22px;
    gap:20px;
    flex-wrap:wrap;
  }
  .section-title{font-size:28px; margin:0;}
  .section-title .num{color:var(--crimson); margin-right:10px;}

  .chips{display:flex; gap:10px; flex-wrap:wrap;}
  .chip{
    border:1px solid rgba(255,255,255,0.12);
    background:var(--card);
    color:var(--cream-dim);
    font-size:12px;
    padding:7px 15px;
    border-radius:999px;
    cursor:pointer;
    letter-spacing:0.03em;
    transition:all 0.15s ease;
  }
  .chip:hover{border-color:var(--gold); color:var(--gold);}
  .chip.active{background:var(--grad); color:var(--void); border-color:transparent; font-weight:700;}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(168px, 1fr));
    gap:20px;
    margin-bottom:64px;
  }
  .card{
    position:relative;
    border-radius:10px;
    overflow:hidden;
    background:var(--card);
    cursor:pointer;
    aspect-ratio:2/3;
    border:1px solid rgba(255,255,255,0.06);
  }
  .card img{width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.4s ease;}
  .card:hover img{transform:scale(1.06);}
  .card-overlay{
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(10,4,9,0.95) 0%, rgba(10,4,9,0.1) 55%, transparent 70%);
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:14px;
    opacity:0;
    transition:opacity 0.25s ease;
  }
  .card:hover .card-overlay{opacity:1;}
  .card-title{font-size:14px; font-weight:600; line-height:1.25; margin-bottom:6px;}
  .card-rating{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:12px;
    color:var(--gold);
    font-weight:700;
  }
  .card-badge{
    position:absolute; top:10px; left:10px;
    background:rgba(19,7,18,0.75);
    border:1px solid rgba(244,185,66,0.4);
    color:var(--gold);
    font-size:11px;
    font-weight:700;
    padding:3px 8px;
    border-radius:5px;
  }
  .skeleton{background:linear-gradient(100deg, var(--card) 30%, #2b1626 50%, var(--card) 70%); background-size:200% 100%; animation:shimmer 1.4s infinite;}
  @keyframes shimmer{0%{background-position:200% 0;} 100%{background-position:-200% 0;}}

  .empty-state{
    text-align:center;
    padding:70px 20px;
    color:var(--cream-dim);
  }
  .empty-state .display{font-size:24px; color:var(--cream); margin-bottom:8px;}

  .modal-bg{
    position:fixed; inset:0;
    background:rgba(8,3,7,0.82);
    backdrop-filter:blur(4px);
    z-index:100;
    display:none;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .modal-bg.open{display:flex;}
  .modal{
    background:var(--void-2);
    max-width:820px;
    width:100%;
    max-height:86vh;
    overflow-y:auto;
    border-radius:14px;
    border:1px solid rgba(244,185,66,0.2);
    position:relative;
  }
  .modal-close{
    position:absolute; top:16px; right:16px;
    background:rgba(19,7,18,0.7);
    border:1px solid rgba(255,255,255,0.15);
    color:var(--cream);
    width:34px; height:34px;
    border-radius:50%;
    cursor:pointer;
    font-size:16px;
    z-index:5;
  }
  .modal-hero{
    height:280px;
    background-size:cover;
    background-position:center;
    position:relative;
    border-radius:14px 14px 0 0;
  }
  .modal-hero::after{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(to top, var(--void-2), transparent 60%);
  }
  .modal-body{padding:0 34px 34px;}
  .modal-title{font-size:32px; margin:-20px 0 12px; position:relative; z-index:1;}
  .modal-tags{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px;}
  .modal-overview{color:var(--cream-dim); line-height:1.7; font-size:15px;}
  .modal-loading{padding:80px; text-align:center; color:var(--cream-dim);}

  footer{
    padding:36px 5vw;
    border-top:1px solid rgba(255,255,255,0.06);
    color:var(--cream-dim);
    font-size:12px;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
  }
  footer .display{font-size:16px; color:var(--cream);}

  @media(max-width:640px){
    header{padding:16px 5vw;}
    .search-wrap{order:3; max-width:100%;}
  }
</style>
</head>
<body>

<header>
  <div class="logo display">44th<em>Stream</em></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search movies..." autocomplete="off">
  </div>
  <div class="status-badge" id="statusBadge">● Live</div>
</header>

<section class="hero" id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-fade"></div>
  <div class="hero-content">
    <div class="eyebrow">Now Showing</div>
    <h1 class="hero-title display" id="heroTitle">Loading...</h1>
    <p class="hero-desc" id="heroDesc">Fetching the latest trending movies from TMDB.</p>
    <div class="hero-meta" id="heroMeta"></div>
    <button class="btn-primary" id="heroCta">View details</button>
  </div>
</section>

<main>
  <div class="section-head">
    <h2 class="section-title display"><span class="num">01</span>Trending This Week</h2>
    <div class="chips" id="genreChips"></div>
  </div>
  <div class="grid" id="trendingGrid"></div>

  <div class="section-head">
    <h2 class="section-title display"><span class="num">02</span>Top Rated</h2>
  </div>
  <div class="grid" id="topRatedGrid"></div>

  <div class="section-head" id="searchHead" style="display:none;">
    <h2 class="section-title display"><span class="num">→</span>Search Results</h2>
  </div>
  <div class="grid" id="searchGrid"></div>
</main>

<footer>
  <div class="display">44thStream</div>
  <div>Movie data &amp; images courtesy of TMDB · Built with ❤️</div>
</footer>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent" class="modal-loading">Loading…</div>
  </div>
</div>

<script>
// ============================================================
// CONFIG — point to your Render backend
// ============================================================
const API_BASE = 'https://four4thstream.onrender.com/api';

// ============================================================
// DOM refs
// ============================================================
const $ = (id) => document.getElementById(id);
const trendingGrid = $('trendingGrid');
const topRatedGrid = $('topRatedGrid');
const searchGrid = $('searchGrid');
const searchHead = $('searchHead');
const genreChips = $('genreChips');

let currentGenre = null;

// ============================================================
// Helpers
// ============================================================
function skeletonCards(n) {
  return Array.from({ length: n }).map(() => `<div class="card skeleton"></div>`).join('');
}

function ratingColor(score) {
  return score >= 7 ? 'var(--teal)' : score >= 5 ? 'var(--gold)' : 'var(--crimson)';
}

function movieCard(m) {
  const poster = m.poster_path ? `https://image.tmdb.org/t/p/w342${m.poster_path}` : null;
  const rating = m.vote_average ? m.vote_average.toFixed(1) : '—';
  return `
    <div class="card" data-id="${m.id}">
      ${poster ? `<img src="${poster}" alt="${m.title || m.name}" loading="lazy">` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--cream-dim);font-size:12px;padding:10px;text-align:center;">${m.title || m.name}</div>`}
      ${m.release_date ? `<div class="card-badge">${m.release_date.slice(0, 4)}</div>` : ''}
      <div class="card-overlay">
        <div class="card-title">${m.title || m.name}</div>
        <div class="card-rating" style="color:${ratingColor(m.vote_average || 0)}">★ ${rating}</div>
      </div>
    </div>
  `;
}

function attachCardHandlers(container) {
  container.querySelectorAll('.card[data-id]').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.id));
  });
}

// ============================================================
// API calls to your backend
// ============================================================
async function fetchFromBackend(endpoint) {
  const res = await fetch(`${API_BASE}${endpoint}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ============================================================
// Load sections
// ============================================================
async function loadTrending() {
  trendingGrid.innerHTML = skeletonCards(12);
  try {
    const data = await fetchFromBackend('/movies/popular');
    trendingGrid.innerHTML = data.map(movieCard).join('');
    attachCardHandlers(trendingGrid);
    if (data.length) setHeroFrom(data[0]);
  } catch (e) {
    trendingGrid.innerHTML = `<div class="empty-state"><div class="display">Couldn't load trending</div>${e.message}</div>`;
  }
}

async function loadTopRated() {
  topRatedGrid.innerHTML = skeletonCards(12);
  try {
    const data = await fetchFromBackend('/movies/trending');
    topRatedGrid.innerHTML = data.slice(0, 12).map(movieCard).join('');
    attachCardHandlers(topRatedGrid);
  } catch (e) {
    topRatedGrid.innerHTML = '';
  }
}

async function loadGenres() {
  // Genres are not directly available from your backend yet — we'll use a static list
  const genres = [
    { id: 28, name: 'Action' },
    { id: 35, name: 'Comedy' },
    { id: 18, name: 'Drama' },
    { id: 878, name: 'Sci-Fi' },
    { id: 27, name: 'Horror' },
    { id: 10749, name: 'Romance' },
    { id: 16, name: 'Animation' }
  ];
  genreChips.innerHTML = `<div class="chip active" data-id="">All</div>` +
    genres.map(g => `<div class="chip" data-id="${g.id}">${g.name}</div>`).join('');

  genreChips.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', async () => {
      genreChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentGenre = chip.dataset.id || null;
      trendingGrid.innerHTML = skeletonCards(12);
      try {
        const data = currentGenre
          ? await fetchFromBackend(`/movies/discover?genre=${currentGenre}`)
          : await fetchFromBackend('/movies/popular');
        trendingGrid.innerHTML = data.map(movieCard).join('');
        attachCardHandlers(trendingGrid);
      } catch (e) {
        trendingGrid.innerHTML = `<div class="empty-state">Failed to load</div>`;
      }
    });
  });
}

// ============================================================
// Hero
// ============================================================
function setHeroFrom(m) {
  if (!m) return;
  const heroBg = $('heroBg');
  if (m.backdrop_path) {
    heroBg.style.backgroundImage = `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
    heroBg.classList.add('show');
  }
  $('heroTitle').textContent = m.title || m.name;
  $('heroDesc').textContent = m.overview || 'No synopsis available.';
  $('heroMeta').innerHTML = `
    <div class="pill">★ ${(m.vote_average || 0).toFixed(1)}</div>
    <div class="pill">${(m.release_date || '').slice(0, 4) || '—'}</div>
  `;
  $('heroCta').onclick = () => openModal(m.id);
}

// ============================================================
// Modal
// ============================================================
async function openModal(id) {
  $('modalBg').classList.add('open');
  $('modalContent').className = 'modal-loading';
  $('modalContent').innerHTML = 'Loading…';
  try {
    const m = await fetchFromBackend(`/movie/${id}`);
    const backdrop = m.backdrop_path ? `https://image.tmdb.org/t/p/original${m.backdrop_path}` : '';
    $('modalContent').className = '';
    $('modalContent').innerHTML = `
      <div class="modal-hero" style="background-image:url(${backdrop})"></div>
      <div class="modal-body">
        <h2 class="modal-title display">${m.title}</h2>
        <div class="modal-tags">
          <div class="pill">★ ${(m.vote_average || 0).toFixed(1)}</div>
          <div class="pill">${m.release_date || '—'}</div>
          ${m.runtime ? `<div class="pill">${m.runtime} min</div>` : ''}
          ${(m.genres || []).map(g => `<div class="pill">${g.name}</div>`).join('')}
        </div>
        <p class="modal-overview">${m.overview || 'No synopsis available.'}</p>
      </div>
    `;
  } catch (e) {
    $('modalContent').innerHTML = `<div class="modal-loading">Couldn't load details.</div>`;
  }
}

$('modalClose').addEventListener('click', () => $('modalBg').classList.remove('open'));
$('modalBg').addEventListener('click', (e) => {
  if (e.target.id === 'modalBg') $('modalBg').classList.remove('open');
});

// ============================================================
// Search
// ============================================================
let searchTimer;
$('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) {
    searchHead.style.display = 'none';
    searchGrid.innerHTML = '';
    return;
  }
  searchHead.style.display = 'flex';
  searchGrid.innerHTML = skeletonCards(6);
  searchTimer = setTimeout(async () => {
    try {
      const data = await fetchFromBackend(`/movies/search?q=${encodeURIComponent(q)}`);
      searchGrid.innerHTML = data.length
        ? data.map(movieCard).join('')
        : `<div class="empty-state"><div class="display">No matches</div>Try another title.</div>`;
      attachCardHandlers(searchGrid);
    } catch (e) {
      searchGrid.innerHTML = `<div class="empty-state">Search failed.</div>`;
    }
  }, 400);
});

// ============================================================
// Boot
// ============================================================
trendingGrid.innerHTML = skeletonCards(12);
topRatedGrid.innerHTML = skeletonCards(12);

loadTrending();
loadTopRated();
loadGenres();

// Show live status
document.getElementById('statusBadge').textContent = '● Live';
</script>
</body>
</html>
