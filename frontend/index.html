<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>44thStream</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b0b0b;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 30px;
      border-bottom: 2px solid #e50914;
      padding-bottom: 15px;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #e50914;
    }
    .search-box {
      display: flex;
      gap: 10px;
    }
    .search-box input {
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      background: #1f1f1f;
      color: #fff;
      width: 250px;
    }
    .search-box button {
      padding: 8px 18px;
      border: none;
      border-radius: 20px;
      background: #e50914;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    .tabs {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 8px 20px;
      background: #1f1f1f;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }
    .tab.active {
      background: #e50914;
      color: #fff;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 20px;
    }
    .card {
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.2s;
      cursor: pointer;
    }
    .card:hover {
      transform: scale(1.03);
    }
    .card img {
      width: 100%;
      height: 230px;
      object-fit: cover;
    }
    .card .info {
      padding: 12px;
    }
    .card .title {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card .meta {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    .detail-view {
      display: none;
      background: #141414;
      padding: 20px;
      border-radius: 12px;
    }
    .detail-view.show {
      display: block;
    }
    .back-btn {
      background: #333;
      border: none;
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .episode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }
    .episode-btn {
      background: #222;
      border: none;
      color: #fff;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .episode-btn:hover {
      background: #e50914;
    }
    .video-container {
      margin-top: 20px;
    }
    .video-container video {
      width: 100%;
      max-height: 500px;
      background: #000;
    }
    .footer {
      margin-top: 40px;
      text-align: center;
      color: #555;
      font-size: 13px;
      border-top: 1px solid #1f1f1f;
      padding-top: 20px;
    }
    @media (max-width: 600px) {
      .search-box input {
        width: 150px;
      }
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">44thStream</div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search anime..." />
      <button onclick="searchAnime()">Search</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="airing" onclick="switchTab('airing')">📅 Airing</div>
    <div class="tab" data-tab="anime" onclick="switchTab('anime')">🎌 Anime</div>
    <div class="tab" data-tab="movies" onclick="switchTab('movies')">🎬 Movies</div>
    <div class="tab" data-tab="dramas" onclick="switchTab('dramas')">🇰🇷 Dramas</div>
  </div>

  <div id="mainGrid" class="grid"></div>

  <div id="detailView" class="detail-view">
    <button class="back-btn" onclick="closeDetail()">← Back</button>
    <div id="detailContent"></div>
  </div>

  <div class="footer">44thStream · Powered by DavidCyril API</div>

  <script>
    // ============================================================
    // CONFIG — Your friend's API
    // ============================================================
    const API_BASE = 'https://apis.davidcyril.name.ng';

    // ============================================================
    // STATE
    // ============================================================
    let currentTab = 'airing';
    let currentAnimeId = null;
    let currentEpisodes = [];

    // ============================================================
    // DOM REFS
    // ============================================================
    const mainGrid = document.getElementById('mainGrid');
    const detailView = document.getElementById('detailView');
    const detailContent = document.getElementById('detailContent');

    // ============================================================
    // FETCH FROM API
    // ============================================================
    async function fetchAPI(endpoint) {
      const url = `${API_BASE}${endpoint}`;
      console.log('Fetching:', url);
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    }

    // ============================================================
    // LOAD AIRING SCHEDULE
    // ============================================================
    async function loadAiring() {
      mainGrid.innerHTML = '<div class="loading">Loading airing schedule...</div>';
      try {
        const data = await fetchAPI('/anime/airing');
        renderAnime(data, 'airing');
      } catch (e) {
        mainGrid.innerHTML = `<div class="loading">Failed to load: ${e.message}</div>`;
      }
    }

    // ============================================================
    // LOAD ANIME LIST
    // ============================================================
    async function loadAnimeList() {
      mainGrid.innerHTML = '<div class="loading">Loading anime...</div>';
      try {
        const data = await fetchAPI('/anime/list');
        renderAnime(data);
      } catch (e) {
        mainGrid.innerHTML = `<div class="loading">Failed to load: ${e.message}</div>`;
      }
    }

    // ============================================================
    // SEARCH
    // ============================================================
    async function searchAnime() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) { loadAiring(); return; }
      mainGrid.innerHTML = '<div class="loading">Searching...</div>';
      try {
        const data = await fetchAPI(`/anime/search?q=${encodeURIComponent(query)}`);
        renderAnime(data);
      } catch (e) {
        mainGrid.innerHTML = `<div class="loading">Search failed: ${e.message}</div>`;
      }
    }

    // ============================================================
    // RENDER
    // ============================================================
    function renderAnime(data, source) {
      let list = data;
      if (data.results) list = data.results;
      if (data.data) list = data.data;
      if (!Array.isArray(list)) list = [list];

      if (list.length === 0) {
        mainGrid.innerHTML = '<div class="loading">No results found.</div>';
        return;
      }

      mainGrid.innerHTML = list.map(item => `
        <div class="card" onclick="openDetail('${item.id || item.mal_id || item.animeId}')">
          <img src="${item.image || item.poster || item.images?.jpg?.image_url || 'https://via.placeholder.com/300x430?text=No+Image'}" alt="${item.title || item.name}" loading="lazy" />
          <div class="info">
            <div class="title">${item.title || item.name || 'Unknown'}</div>
            <div class="meta">★ ${item.rating || item.score || 'N/A'} · ${item.year || ''}</div>
          </div>
        </div>
      `).join('');
    }

    // ============================================================
    // OPEN DETAIL
    // ============================================================
    async function openDetail(animeId) {
      currentAnimeId = animeId;
      detailView.classList.add('show');
      mainGrid.style.display = 'none';
      detailContent.innerHTML = '<div class="loading">Loading info...</div>';

      try {
        // Get anime info
        const info = await fetchAPI(`/anime/info?id=${animeId}`);
        // Get episodes
        const episodes = await fetchAPI(`/anime/episodes?id=${animeId}`);
        
        currentEpisodes = episodes.results || episodes.data || episodes || [];
        renderDetail(info, currentEpisodes);
      } catch (e) {
        detailContent.innerHTML = `<div class="loading">Failed to load: ${e.message}</div>`;
      }
    }

    function renderDetail(info, episodes) {
      const title = info.title || info.name || 'Unknown';
      const poster = info.image || info.poster || info.images?.jpg?.image_url || '';
      const synopsis = info.synopsis || info.overview || 'No description available.';
      const rating = info.rating || info.score || 'N/A';
      const year = info.year || '';

      let html = `
        <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:20px;">
          <img src="${poster}" alt="${title}" style="width:200px;border-radius:10px;object-fit:cover;" />
          <div style="flex:1;min-width:200px;">
            <h2>${title}</h2>
            <p style="color:#aaa;margin:10px 0;">★ ${rating} · ${year}</p>
            <p style="line-height:1.6;">${synopsis}</p>
          </div>
        </div>
      `;

      if (episodes && episodes.length > 0) {
        html += `
          <h3>Episodes (${episodes.length})</h3>
          <div class="episode-grid">
            ${episodes.slice(0, 30).map((ep, i) => `
              <button class="episode-btn" onclick="playEpisode('${ep.id || ep.episodeId || i}')">
                ${ep.number || ep.episode || i + 1}
              </button>
            `).join('')}
          </div>
        `;
      }

      html += `<div class="video-container" id="videoContainer"><p style="color:#888;font-size:14px;">Click an episode to play.</p></div>`;
      detailContent.innerHTML = html;
    }

    // ============================================================
    // PLAY EPISODE
    // ============================================================
    async function playEpisode(episodeId) {
      const container = document.getElementById('videoContainer');
      container.innerHTML = '<div class="loading">Loading video...</div>';

      try {
        const data = await fetchAPI(`/anime/watch?id=${episodeId}`);
        const videoUrl = data.url || data.stream || data.source || data.video || data.link;

        if (videoUrl) {
          container.innerHTML = `
            <video controls autoplay style="width:100%;max-height:500px;">
              <source src="${videoUrl}" type="video/mp4">
              Your browser does not support the video tag.
            </video>
            <button onclick="downloadVideo('${videoUrl}')" style="margin-top:10px;padding:8px 20px;background:#e50914;border:none;color:#fff;border-radius:6px;cursor:pointer;">⬇️ Download</button>
          `;
        } else {
          container.innerHTML = '<div class="loading">No video source found.</div>';
        }
      } catch (e) {
        container.innerHTML = `<div class="loading">Failed to load video: ${e.message}</div>`;
      }
    }

    function downloadVideo(url) {
      const a = document.createElement('a');
      a.href = url;
      a.download = 'video.mp4';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // ============================================================
    // CLOSE DETAIL
    // ============================================================
    function closeDetail() {
      detailView.classList.remove('show');
      mainGrid.style.display = 'grid';
    }

    // ============================================================
    // SWITCH TABS
    // ============================================================
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
      closeDetail();

      if (tab === 'airing') loadAiring();
      else if (tab === 'anime') loadAnimeList();
      else if (tab === 'movies') {
        mainGrid.innerHTML = '<div class="loading">🎬 Movies coming soon — using anime API for now.</div>';
      } else if (tab === 'dramas') {
        mainGrid.innerHTML = '<div class="loading">🇰🇷 Dramas coming soon — using anime API for now.</div>';
      }
    }

    // ============================================================
    // SEARCH ON ENTER
    // ============================================================
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchAnime();
    });

    // ============================================================
    // BOOT
    // ============================================================
    loadAiring();
  </script>
</body>
</html>
