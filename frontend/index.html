<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>44thStream — Movies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --void: #130712;
      --void-2: #1c0a19;
      --card: #20101d;
      --cream: #f3e9de;
      --cream-dim: #c9b8ad;
      --gold: #f4b942;
      --crimson: #e63950;
      --teal: #1fe6c4;
      --grad: linear-gradient(115deg, var(--crimson) 0%, var(--gold) 55%, var(--teal) 100%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Work Sans', Arial, sans-serif;
      background: var(--void);
      color: var(--cream);
      overflow-x: hidden;
    }
    .display { font-family: 'Anton', sans-serif; letter-spacing: 0.02em; text-transform: uppercase; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 5vw;
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(19, 7, 18, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(244, 185, 66, 0.12);
      gap: 16px;
      flex-wrap: wrap;
    }
    .logo { font-size: 26px; letter-spacing: 0.03em; }
    .logo em { font-style: normal; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .search-wrap { flex: 1; min-width: 180px; max-width: 400px; }
    .search-wrap input {
      width: 100%;
      background: var(--void-2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 10px 18px;
      color: var(--cream);
      font-size: 14px;
      outline: none;
    }
    .search-wrap input:focus { border-color: var(--gold); }
    .search-wrap input::placeholder { color: var(--cream-dim); }
    .header-actions { display: flex; align-items: center; gap: 14px; }
    .status-badge {
      font-size: 11px;
      color: var(--teal);
      background: rgba(31,230,196,0.12);
      padding: 4px 14px;
      border-radius: 999px;
      border: 1px solid rgba(31,230,196,0.25);
    }
    .auth-btn {
      background: var(--grad);
      border: none;
      color: var(--void);
      font-weight: 700;
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 999px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tabs {
      display: flex;
      gap: 6px;
      padding: 12px 5vw;
      background: var(--void-2);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-wrap: wrap;
    }
    .tabs button {
      padding: 8px 18px;
      background: transparent;
      color: var(--cream-dim);
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .tabs button:hover { color: var(--cream); }
    .tabs button.active {
      background: rgba(244,185,66,0.15);
      color: var(--gold);
      border-color: rgba(244,185,66,0.3);
    }

    .hero {
      position: relative;
      height: 70vh;
      min-height: 400px;
      display: flex;
      align-items: flex-end;
      background: radial-gradient(ellipse at top right, rgba(230,57,80,0.15), transparent 55%),
                  radial-gradient(ellipse at bottom left, rgba(31,230,196,0.08), transparent 55%),
                  var(--void);
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center 20%;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .hero-bg.show { opacity: 0.5; }
    .hero-fade {
      position: absolute; inset: 0;
      background: linear-gradient(to top, var(--void) 8%, rgba(19,7,18,0.35) 45%, rgba(19,7,18,0.15) 100%);
    }
    .hero-content {
      position: relative;
      z-index: 2;
      padding: 0 5vw 40px;
      max-width: 720px;
    }
    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .hero-title {
      font-size: clamp(32px, 5vw, 64px);
      line-height: 0.95;
      margin: 0 0 12px;
    }
    .hero-desc {
      color: var(--cream-dim);
      font-size: 15px;
      line-height: 1.6;
      max-width: 540px;
      margin: 0 0 18px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .hero-meta { display: flex; gap: 12px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
    .pill {
      border: 1px solid rgba(244,185,66,0.3);
      color: var(--gold);
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 999px;
    }
    .btn-primary {
      background: var(--grad);
      border: none;
      color: var(--void);
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 6px;
      font-size: 14px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 24px -6px rgba(230,57,80,0.4);
      transition: transform 0.15s;
    }
    .btn-primary:hover { transform: translateY(-2px); }

    main { padding: 32px 5vw 80px; }
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .section-title { font-size: 24px; }
    .section-title .num { color: var(--crimson); margin-right: 8px; }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--card);
      color: var(--cream-dim);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--gold); color: var(--gold); }
    .chip.active { background: var(--grad); color: var(--void); border-color: transparent; font-weight: 700; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 18px;
      margin-bottom: 40px;
    }
    .card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
      cursor: pointer;
      aspect-ratio: 2/3;
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.2s;
    }
    .card:hover { transform: scale(1.03); z-index: 2; }
    .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,4,9,0.95) 0%, rgba(10,4,9,0.1) 55%, transparent 70%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 12px;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card:hover .card-overlay { opacity: 1; }
    .card-title { font-size: 14px; font-weight: 600; line-height: 1.2; margin-bottom: 4px; }
    .card-rating { font-size: 12px; color: var(--gold); font-weight: 700; }
    .card-badge {
      position: absolute; top: 8px; left: 8px;
      background: rgba(19,7,18,0.8);
      border: 1px solid rgba(244,185,66,0.3);
      color: var(--gold);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .skeleton {
      background: linear-gradient(100deg, var(--card) 30%, #2b1626 50%, var(--card) 70%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--cream-dim); }
    .empty-state .display { font-size: 22px; color: var(--cream); margin-bottom: 6px; }

    #detailPage {
      display: none;
      padding: 20px 5vw 60px;
      max-width: 1200px;
      margin: 0 auto;
    }
    #detailPage.show { display: block; }
    .back-btn {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--cream);
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .detail-hero {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
    .detail-poster {
      flex: 0 0 280px;
      border-radius: 12px;
      overflow: hidden;
    }
    .detail-poster img { width: 100%; display: block; }
    .detail-info { flex: 1; min-width: 280px; }
    .detail-info h1 { font-size: 32px; margin-bottom: 8px; }
    .detail-info .overview { color: var(--cream-dim); line-height: 1.7; margin-bottom: 16px; }
    .detail-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .detail-meta .pill { border-color: rgba(255,255,255,0.15); color: var(--cream-dim); }
    .detail-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }

    .episodes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }
    .episode-btn {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--cream);
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      text-align: center;
      transition: all 0.2s;
    }
    .episode-btn:hover { border-color: var(--gold); color: var(--gold); }

    .video-player {
      margin: 20px 0;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
    }
    .video-player video { width: 100%; max-height: 500px; display: block; }

    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(8,3,7,0.85);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--void-2);
      max-width: 800px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 14px;
      border: 1px solid rgba(244,185,66,0.15);
      position: relative;
    }
    .modal-close {
      position: absolute; top: 12px; right: 12px;
      background: rgba(19,7,18,0.7);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--cream);
      width: 34px; height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      z-index: 5;
    }
    .modal-hero {
      height: 240px;
      background-size: cover;
      background-position: center;
      border-radius: 14px 14px 0 0;
      position: relative;
    }
    .modal-hero::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(to top, var(--void-2), transparent 60%);
    }
    .modal-body { padding: 0 28px 28px; }
    .modal-title { font-size: 28px; margin: -16px 0 10px; position: relative; z-index: 1; }
    .modal-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .modal-overview { color: var(--cream-dim); line-height: 1.7; font-size: 14px; }
    .modal-loading { padding: 60px; text-align: center; color: var(--cream-dim); }

    footer {
      padding: 28px 5vw;
      border-top: 1px solid rgba(255,255,255,0.06);
      color: var(--cream-dim);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    footer .display { font-size: 16px; color: var(--cream); }

    @media (max-width: 640px) {
      header { padding: 14px 5vw; }
      .search-wrap { order: 3; max-width: 100%; flex-basis: 100%; }
      .tabs button { font-size: 11px; padding: 6px 12px; }
      .detail-poster { flex: 0 0 100%; max-width: 220px; margin: 0 auto; }
      .hero { height: 50vh; min-height: 320px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo display">44th<em>Stream</em></div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search movies..." autocomplete="off" />
    </div>
    <div class="header-actions">
      <span class="status-badge" id="statusBadge">● Live</span>
      <button class="auth-btn" id="authBtn">Sign In</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="trending">🔥 Trending</button>
    <button class="tab-btn" data-tab="latest">🆕 Latest</button>
    <button class="tab-btn" data-tab="nkiri">🇳🇬 Nkiri</button>
    <button class="tab-btn" data-tab="tv">📺 TV Shows</button>
    <button class="tab-btn" data-tab="dramas">🇰🇷 Dramas</button>
  </nav>

  <section class="hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-fade"></div>
    <div class="hero-content">
      <div class="eyebrow" id="heroEyebrow">Now Showing</div>
      <h1 class="hero-title display" id="heroTitle">44thStream</h1>
      <p class="hero-desc" id="heroDesc">Movies, TV shows, and Korean dramas.</p>
      <div class="hero-meta" id="heroMeta"></div>
      <button class="btn-primary" id="heroCta">View Details</button>
    </div>
  </section>

  <main>
    <div class="section-head">
      <h2 class="section-title display"><span class="num">01</span><span id="sectionTitle">Trending Movies</span></h2>
      <div class="chips" id="genreChips"></div>
    </div>
    <div class="grid" id="mainGrid"></div>

    <div class="section-head" id="searchHead" style="display:none;">
      <h2 class="section-title display"><span class="num">→</span>Search Results</h2>
    </div>
    <div class="grid" id="searchGrid"></div>
  </main>

  <footer>
    <div class="display">44thStream</div>
    <div>Powered by ZST Labs · Built with ❤️</div>
  </footer>

  <div id="detailPage">
    <button class="back-btn" id="backBtn">← Back</button>
    <div id="detailContent"></div>
  </div>

  <div class="modal-bg" id="modalBg">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div id="modalContent" class="modal-loading">Loading…</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
